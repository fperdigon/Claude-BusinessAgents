<svg viewBox="0 0 500 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Attention mark (single fill, monochrome) -->
  <!-- Skip arcs -->
  <path d="M 28,18 Q 50,4 72,68" stroke="#0f172a" stroke-width="0.8" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M 28,68 Q 50,82 72,18" stroke="#0f172a" stroke-width="0.8" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Cross arcs -->
  <path d="M 28,18 Q 50,22 72,43" stroke="#0f172a" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 28,43 Q 50,30 72,18" stroke="#0f172a" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 28,43 Q 50,56 72,68" stroke="#0f172a" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 28,68 Q 50,70 72,43" stroke="#0f172a" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  <!-- Strong same-row arcs -->
  <path d="M 28,18 Q 50,10 72,18" stroke="#0f172a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 28,43 Q 50,35 72,43" stroke="#0f172a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 28,68 Q 50,76 72,68" stroke="#0f172a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Left nodes -->
  <circle cx="28" cy="18" r="3.5" fill="#0f172a"/>
  <circle cx="28" cy="43" r="3.5" fill="#0f172a"/>
  <circle cx="28" cy="68" r="3.5" fill="#0f172a"/>
  <!-- Right nodes -->
  <circle cx="72" cy="18" r="3.5" fill="#0f172a"/>
  <circle cx="72" cy="43" r="3.5" fill="#0f172a"/>
  <circle cx="72" cy="68" r="3.5" fill="#0f172a"/>
  <!-- Divider -->
  <line x1="88" y1="10" x2="88" y2="90" stroke="#0f172a" stroke-width="0.8" opacity="0.25"/>
  <!-- Wordmark -->
  <text x="100" y="44" font-family="'Inter','Outfit',system-ui,-apple-system,sans-serif"
        font-size="30" font-weight="300" fill="#0f172a" letter-spacing="-0.01em">Francisco</text>
  <text x="101" y="72" font-family="'Inter','Outfit',system-ui,-apple-system,sans-serif"
