<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="icon-clip">
      <rect x="0" y="0" width="200" height="200" rx="28"/>
    </clipPath>
  </defs>
  <rect x="0" y="0" width="200" height="200" rx="28" fill="#0f172a"/>
  <g clip-path="url(#icon-clip)">
    <!-- Weak skip-row arcs -->
    <path d="M 52,60 Q 100,18 148,140" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.18" stroke-linecap="round"/>
    <path d="M 52,140 Q 100,182 148,60" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.18" stroke-linecap="round"/>
    <!-- Medium cross-row arcs -->
    <path d="M 52,60 Q 100,48 148,100" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M 52,100 Q 100,72 148,60" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M 52,100 Q 100,128 148,140" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M 52,140 Q 100,152 148,100" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round"/>
    <!-- Strong same-row arcs (attention peaks) -->
    <path d="M 52,60 Q 100,42 148,60" stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.88" stroke-linecap="round"/>
    <path d="M 52,100 Q 100,82 148,100" stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.88" stroke-linecap="round"/>
    <path d="M 52,140 Q 100,158 148,140" stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.88" stroke-linecap="round"/>
    <!-- Left column nodes (query tokens) -->
    <circle cx="52" cy="60" r="7" fill="#22d3ee"/>
    <circle cx="52" cy="100" r="7" fill="#22d3ee"/>
    <circle cx="52" cy="140" r="7" fill="#22d3ee"/>
    <!-- Right column nodes (key/value tokens) -->
    <circle cx="148" cy="60" r="7" fill="#22d3ee"/>
    <circle cx="148" cy="100" r="7" fill="#22d3ee"/>
    <circle cx="148" cy="140" r="7" fill="#22d3ee"/>
  </g>
</svg>
